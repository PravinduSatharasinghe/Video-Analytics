<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Analytics Console</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-card: #1a1f35;
            --bg-input: #0d1117;
            --border: #2a3050;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .conn-bar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .conn-bar input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.45rem 0.7rem;
            border-radius: 6px;
            font-size: 0.82rem;
            width: 160px;
        }

        .btn {
            padding: 0.45rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-dot.on {
            background: var(--success);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
        }

        .main {
            padding: 1.25rem 2rem;
        }

        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 55vh;
            color: var(--text-muted);
            text-align: center;
            gap: 0.75rem;
        }

        .empty .icon {
            font-size: 2.5rem;
            opacity: 0.3;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
            gap: 1.25rem;
        }

        .cam-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .cam-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.9rem;
            border-bottom: 1px solid var(--border);
        }

        .cam-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
        }

        .cam-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .vid-slot {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
        }

        .vid-slot video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .placeholder-msg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .prompt-row {
            padding: 0.6rem 0.9rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        .prompt-row input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 0.7rem;
            border-radius: 6px;
            font-size: 0.82rem;
        }

        .prompt-row button {
            padding: 0.5rem 0.9rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
        }

        .output-box {
            border-top: 1px solid var(--border);
            background: var(--bg-input);
        }

        .output-label {
            padding: 0.4rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .output-body {
            padding: 0.6rem 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            line-height: 1.55;
            white-space: pre-wrap;
            color: var(--text-secondary);
            min-height: 2.5rem;
            max-height: 220px;
            overflow-y: auto;
        }

        .muted {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>Video Analytics Console</h1>

        <div class="conn-bar">
            <input id="roomInput" value="analytics-room" placeholder="Room name">
            <button class="btn" id="connectBtn">Connect</button>

            <div class="status">
                <span class="status-dot" id="sDot"></span>
                <span id="sTxt">Disconnected</span>
            </div>
        </div>
    </header>

    <main class="main">

        <div class="empty" id="emptyState">
            <div class="icon">📡</div>
            <p>Connect to begin webcam testing.</p>
        </div>

        <div class="grid" id="grid" style="display:none;"></div>

    </main>

    <script>
        let room = null;
        let activeCamId = null;

        const sections = new Map();

        const $ = (id) => document.getElementById(id);

        const connectBtn = $('connectBtn');
        const grid = $('grid');
        const emptyState = $('emptyState');

        function setStatus(txt, on = false) {
            $('sTxt').textContent = txt;
            $('sDot').classList.toggle('on', on);
        }

        /* ───────────────────────────────────────────── */

        function addCamera(pid, name) {
            if (sections.has(pid)) {
                return sections.get(pid);
            }

            const card = document.createElement('div');
            card.className = 'cam-card';

            card.innerHTML = `
                <div class="cam-head">
                    <div class="cam-label">
                        <span class="live-dot"></span>
                        ${name || pid}
                    </div>
                    <span class="cam-meta">${pid}</span>
                </div>
                <div class="vid-slot">
                    <div class="placeholder-msg">
                        Waiting for video...
                    </div>
                </div>
                <div class="prompt-row">
                    <input type="text" placeholder="Enter prompt for this camera..." class="p-in">
                    <button class="p-btn">Send</button>
                </div>
                <div class="output-box">
                    <div class="output-label">Agent Output</div>
                    <div class="output-body">
                        <span class="muted">No output yet</span>
                    </div>
                </div>
            `;

            const inp = card.querySelector('.p-in');
            const btn = card.querySelector('.p-btn');

            const send = async () => {
                const txt = inp.value.trim();
                if (!txt || !room) return;

                activeCamId = pid;
                card.querySelector('.output-body').innerHTML = '<span class="muted">⏳ Processing...</span>';

                const payload = JSON.stringify({
                    message: txt,
                    source: 'user',
                    camera_id: pid,
                    timestamp: Date.now()
                });

                try {
                    await room.localParticipant.publishData(
                        new TextEncoder().encode(payload),
                        { reliable: true, topic: 'lk-chat' }
                    );
                } catch (err) {
                    console.error('Failed to send prompt:', err);
                    card.querySelector('.output-body').textContent = 'Failed to send prompt.';
                }

                inp.value = '';
            };

            btn.addEventListener('click', send);
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') send();
            });

            grid.appendChild(card);
            sections.set(pid, card);

            emptyState.style.display = 'none';
            grid.style.display = 'grid';

            return card;
        }

        /* ───────────────────────────────────────────── */

        function attachTrack(pid, track) {
            const card = sections.get(pid);
            if (!card) return;

            const slot = card.querySelector('.vid-slot');
            slot.innerHTML = '';

            const video = document.createElement('video');
            video.autoplay = true;
            video.muted = true;
            video.playsInline = true;

            track.attach(video);
            slot.appendChild(video);
        }

        /* ───────────────────────────────────────────── */

        function showOutput(text) {
            if (!text || !text.trim()) return;

            const targetId = activeCamId || sections.keys().next().value;
            const card = sections.get(targetId);

            if (!card) return;

            // Clear the "Processing..." text and set the new output
            card.querySelector('.output-body').innerHTML = '';
            card.querySelector('.output-body').textContent = text.trim();
        }

        /* ───────────────────────────────────────────── */

        connectBtn.onclick = async () => {
            connectBtn.disabled = true;
            setStatus('Connecting...');

            try {
                const res = await fetch(`/token?room=${encodeURIComponent($('roomInput').value)}`);
                const data = await res.json();

                room = new LivekitClient.Room();

                /* ───────────────────────────────────── */
                /* Remote tracks (Agent & IP cameras)    */
                /* ───────────────────────────────────── */

                room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
                    if (track.kind === LivekitClient.Track.Kind.Video) {
                        addCamera(participant.identity, participant.name || participant.identity);
                        attachTrack(participant.identity, track);
                    }

                    if (track.kind === LivekitClient.Track.Kind.Audio) {
                        const audioEl = document.createElement('audio');
                        audioEl.autoplay = true;
                        track.attach(audioEl);
                        document.body.appendChild(audioEl);
                    }
                });

                /* ───────────────────────────────────── */

                room.on(LivekitClient.RoomEvent.ParticipantDisconnected, (participant) => {
                    const card = sections.get(participant.identity);
                    if (card) {
                        card.remove();
                        sections.delete(participant.identity);
                    }

                    if (!sections.size) {
                        emptyState.style.display = 'flex';
                        grid.style.display = 'none';
                    }
                });

                /* ───────────────────────────────────── */
                /* Agent responses via Data Channel      */
                /* ───────────────────────────────────── */

                room.on(LivekitClient.RoomEvent.DataReceived, (payload, participant, kind, topic) => {
                    console.log("📡 DataPacket received. Topic:", topic);
                    try {
                        const text = new TextDecoder().decode(payload);
                        const msg = JSON.parse(text);

                        console.log("📦 Parsed Data:", msg);

                        // If the payload has source 'agent', process it regardless of topic string parsing
                        if (msg.source === 'agent' && msg.message) {
                            showOutput(msg.message);
                        }
                    } catch (err) {
                        console.error("Not a valid JSON Data Channel message.");
                    }
                });

                /* ───────────────────────────────────── */

                await room.connect(data.url, data.token);

                /* ───────────────────────────────────── */
                /* LOCAL WEBCAM TESTING                  */
                /* ───────────────────────────────────── */

                const localTracks = await LivekitClient.createLocalTracks({
                    audio: false,
                    video: true
                });

                for (const track of localTracks) {
                    await room.localParticipant.publishTrack(track);

                    if (track.kind === LivekitClient.Track.Kind.Video) {
                        const localId = room.localParticipant.identity;
                        addCamera(localId, 'Local Webcam');
                        attachTrack(localId, track);
                    }
                }

                /* ───────────────────────────────────── */

                setStatus('Connected', true);
                connectBtn.textContent = 'Connected';

            } catch (err) {
                console.error(err);
                setStatus(`Error: ${err.message}`);
                connectBtn.disabled = false;
            }
        };
    </script>

</body>

</html>
